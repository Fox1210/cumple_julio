<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Feliz 25 Cumpleaños, Julio!</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            padding: 20px;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px 30px;
            text-align: center;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            animation: fadeIn 1.2s ease-out;
        }

        .badge {
            background: linear-gradient(45deg, #f59e0b, #ef4444);
            color: white;
            font-size: 0.9rem;
            font-weight: 600;
            padding: 6px 16px;
            border-radius: 50px;
            display: inline-block;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(245, 158, 11, 0.4);
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            line-height: 1.2;
            margin-bottom: 10px;
            background: linear-gradient(to right, #38bdf8, #c084fc, #f472b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .age {
            font-size: 5rem;
            font-weight: 800;
            margin: 10px 0;
            color: #fff;
            text-shadow: 0 0 20px rgba(192, 132, 252, 0.6);
            animation: pulse 2s infinite alternate;
        }

        p.message {
            font-size: 1.1rem;
            color: #cbd5e1;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        /* Foto de perfil opcional (puedes cambiar el enlace por una foto suya) */
        .profile-pic {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 4px solid #c084fc;
            margin: 0 auto 20px;
            object-fit: cover;
            display: block;
            box-shadow: 0 0 20px rgba(192, 132, 252, 0.4);
        }

        .btn-celebrate {
            background: linear-gradient(45deg, #a855f7, #6366f1);
            color: white;
            border: none;
            padding: 15px 35px;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3);
        }

        .btn-celebrate:hover {
            transform: scale(1.05);
            box-shadow: 0 15px 25px rgba(99, 102, 241, 0.5);
        }

        .btn-celebrate:active {
            transform: scale(0.98);
        }

        /* Animaciones */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulse {
            from { transform: scale(1); text-shadow: 0 0 20px rgba(192, 132, 252, 0.6); }
            to { transform: scale(1.05); text-shadow: 0 0 30px rgba(244, 114, 182, 0.8); }
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="badge">Quarter Century Club</div>
        <h1>¡Feliz Cumpleaños,<br>Julio!</h1>
        <div class="age">25</div>
        
        <p class="message">
            Oficialmente ha terminado tu suscripción gratuita a la juventud temprana. ¡Bienvenido a los 25! Que este año venga cargado de risas, éxitos, buenos momentos y proyectos brutales. ¡Te mandamos un abrazo gigante! 🥂✨
        </p>
        
        <button class="btn-celebrate" onclick="lanzarConfeti()">¡PRESIONA PARA CELEBRAR!</button>
    </div>

    <script>
        // Función que se ejecuta automáticamente al cargar la página
        window.onload = function() {
            lanzarConfeti();
        };

        // Función para activar el confeti
        function lanzarConfeti() {
            // Explosión del centro
            confetti({
                particleCount: 150,
                spread: 80,
                origin: { y: 0.6 }
            });

            // Disparos desde los lados para más espectacularidad
            var duration = 3 * 1000;
            var end = Date.now() + duration;

            (function frame() {
                confetti({
                    particleCount: 2,
                    angle: 60,
                    spread: 55,
                    origin: { x: 0 }
                });
                confetti({
                    particleCount: 2,
                    angle: 120,
                    spread: 55,
                    origin: { x: 1 }
                });

                if (Date.now() < end) {
                    requestAnimationFrame(frame);
                }
            }());
        }
    </script>
</body>
</html>
